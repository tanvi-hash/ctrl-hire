      /* ============================================================
     DESIGN TOKENS  (Tailwind v4 @theme)
     Every color / font-size / radius / shadow / easing / layout
     size used in this file is defined here, so utilities like
     bg-card / text-ui-13-5 / rounded-md / shadow-card are
     generated from the tokens and can be applied directly in
     markup via class="...".
     ============================================================ */
      @theme {
        /* ---- Fonts ---- */
        --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
        --font-serif: "Instrument Serif", Georgia, serif;

        /* ---- Page gradient stops ---- */
        --color-bg-top: #fef5f0;
        --color-bg-mid: #f6f1fb;
        --color-bg-bot: #edf1f7;
        --color-bg-base-start: #fcf9f7;
        --color-bg-base-end: #f6f3f9;

        /* ---- Ink / text ---- */
        --color-ink: #1f1b2e;
        --color-ink-soft: #4a4560;
        --color-ink-hover: #302a44;
        --color-ink-hover-strong: #2a2540;
        --color-muted: #8a8598;
        --color-faint: #b7b3c4;

        /* ---- Surface ---- */
        --color-card: #ffffff;
        --color-line: #ecebf1;
        --color-line-2: #f5f4f8;
        --color-line-3: #f1eff5;
        --color-line-hover: #d6d3df;
        --color-hover: #faf9fc;
        --color-hover-alt: #fafafd;

        /* ---- Stage: shortlisted (green) ---- */
        --color-stage-shortlisted-bg: #eef7f2;
        --color-stage-shortlisted-fg: #2f7d60;
        --color-stage-shortlisted-dot: #3a9170;
        --color-stage-shortlisted-border: #bfe0cd;

        /* ---- Stage: new ---- */
        --color-stage-new-fg: #4a4560;
        --color-stage-new-border: #e2dfea;
        --color-stage-new-dot: #8a8598;

        /* ---- Stage: screening (blue) ---- */
        --color-stage-screening-fg: #2b6fb5;
        --color-stage-screening-border: #c5dcf5;
        --color-stage-screening-dot: #4583c4;

        /* ---- Stage: saved (amber) ---- */
        --color-stage-saved-bg: #fff7ea;
        --color-stage-saved-fg: #b06b0e;
        --color-stage-saved-border: #f5dcb8;
        --color-stage-saved-dot: #c78a38;

        /* ---- Stage: rejected (pink) ---- */
        --color-stage-rejected-bg: #fdf3f5;
        --color-stage-rejected-fg: #b84056;
        --color-stage-rejected-border: #f4c7d1;
        --color-stage-rejected-dot: #c05575;

        /* ---- Source pills ---- */
        --color-source-referral-bg: #fff3e0;
        --color-source-referral-fg: #c9760f;
        --color-source-linkedin-bg: #e4effc;
        --color-source-linkedin-fg: #2b6fb5;
        --color-source-naukri-bg: #fdecea;
        --color-source-naukri-fg: #c94660;
        --color-source-career-bg: #eff1f5;
        --color-source-career-fg: #4a4560;

        /* ---- Scrims / translucency ---- */
        --color-backdrop: rgb(18 12 34 / 0.28);
        --color-glass-90: rgb(255 255 255 / 0.9);
        --color-glass-70: rgb(255 255 255 / 0.7);
        --color-glass-60: rgb(255 255 255 / 0.6);
        --color-ring-soft: rgb(31 27 46 / 0.08);
        --color-ring-focus: rgb(31 27 46 / 0.05);

        /* ---- Radius ---- */
        --radius-brand: 0.375rem; /* 6px */
        --radius-2xs: 0.5rem; /* 8px */
        --radius-xs: 0.625rem; /* 10px */
        --radius-sm: 0.75rem; /* 12px */
        --radius-md: 1rem; /* 16px */
        --radius-lg: 1.25rem; /* 20px */

        /* ---- Font sizes (px-indexed semantic tokens) ---- */
        --text-ui-10-5: 0.65625rem; /* 10.5 */
        --text-ui-11: 0.6875rem; /* 11   */
        --text-ui-11-5: 0.71875rem; /* 11.5 */
        --text-ui-12: 0.75rem; /* 12   */
        --text-ui-12-5: 0.78125rem; /* 12.5 */
        --text-ui-13: 0.8125rem; /* 13   */
        --text-ui-13-5: 0.84375rem; /* 13.5 — body */
        --text-ui-14: 0.875rem; /* 14   */
        --text-ui-16: 1rem; /* 16   */
        --text-ui-22: 1.375rem; /* 22   */
        --text-ui-24: 1.5rem; /* 24   */
        --text-ui-28: 1.75rem; /* 28   */
        --text-ui-30: 1.875rem; /* 30   */
        --text-ui-40: 2.5rem; /* 40   */

        /* ---- Shadows ---- */
        --shadow-nav:
          0 1px 0 rgb(255 255 255 / 0.9) inset,
          0 10px 30px -16px rgb(60 40 90 / 0.12);
        --shadow-card-lg:
          0 1px 0 rgb(255 255 255 / 0.9) inset,
          0 20px 60px -36px rgb(60 40 90 / 0.18);
        --shadow-card:
          0 1px 0 rgb(255 255 255 / 0.9) inset,
          0 6px 20px -18px rgb(60 40 90 / 0.2);
        --shadow-table:
          0 1px 0 rgb(255 255 255 / 0.9) inset,
          0 6px 20px -18px rgb(60 40 90 / 0.15);
        --shadow-stages: 0 1px 0 rgb(255 255 255 / 0.9) inset;
        --shadow-side: -30px 0 80px -30px rgb(40 25 70 / 0.35);
        --shadow-kpi-focus: 0 0 0 3px rgb(31 27 46 / 0.05);

        /* ---- Easing ---- */
        --ease-panel: cubic-bezier(0.2, 0.9, 0.2, 1);

        /* ---- Layout sizing ---- */
        --container-shell: 1500px;
        --container-cc-main: 1100px;
        --container-search: 280px;
        --container-side: 520px;

        /* ---- Page background stack ---- */
        --background-image-page:
          radial-gradient(
            1100px 700px at 5% -5%,
            var(--color-bg-top) 0%,
            transparent 55%
          ),
          radial-gradient(
            900px 900px at 95% 15%,
            var(--color-bg-mid) 0%,
            transparent 55%
          ),
          radial-gradient(
            1100px 700px at 50% 100%,
            var(--color-bg-bot) 0%,
            transparent 55%
          ),
          linear-gradient(
            180deg,
            var(--color-bg-base-start) 0%,
            var(--color-bg-base-end) 100%
          );
      }

      /* ============================================================
     BASE
     ============================================================ */
      @layer base {
        *,
        *::before,
        *::after {
          box-sizing: border-box;
        }
        /* NOTE: do NOT set font-size on <html> — rem tokens must resolve
       against the browser-default 16px root, or everything shrinks. */
        html,
        body {
          margin: 0;
        }
        body {
          min-height: 100vh;
          font-family: var(--font-sans);
          color: var(--color-ink);
          font-size: var(--text-ui-13-5);
          line-height: 1.5;
          -webkit-font-smoothing: antialiased;
          background-image: var(--background-image-page);
        }
        button {
          font-family: inherit;
          font-size: inherit;
          color: inherit;
          cursor: pointer;
        }
        a {
          color: inherit;
          text-decoration: none;
        }
      }

      /* ============================================================
     MINIMAL STATEFUL CSS (UNLAYERED)
     Only rules that can't be expressed as plain Tailwind utilities
     live here: JS-toggled variants (.on, .copied), compound hover
     selectors (.iconbtn:hover.ok|.save|.no), and a couple of
     opacity-reveal behaviors used across templated rows.

     These rules are intentionally left UNLAYERED so they win over
     utility classes in markup. Tailwind v4's default cascade puts
     @layer utilities above @layer components; putting anything
     stateful in `components` would be overridden by the utilities
     the markup uses to paint the base state.
     ============================================================ */

      /* Stage filter — selected pill */
      .stg.on {
        background-color: var(--color-ink);
        color: #fff;
      }
      .stg.on .stg-count {
        color: var(--color-faint);
      }
      .stg.on .stg-dot {
        display: none;
      }

      /* View toggle — selected button */
      #view-toggle button.on {
        background-color: var(--color-ink);
        color: #fff;
      }

      /* Side panel + backdrop — open states (toggled by JS) */
      .backdrop.on {
        opacity: 1;
        pointer-events: auto;
      }
      .side.on {
        transform: translateX(0);
      }

      /* Copy button — transient "copied" feedback */
      .copy.copied {
        opacity: 1 !important;
        color: var(--color-stage-shortlisted-fg);
        background-color: var(--color-stage-shortlisted-bg);
      }
      /* Copy button — reveal on contact-item hover */
      .contact-item:hover .copy,
      .s-contact .ci:hover .copy {
        opacity: 1;
      }

      /* Icon action buttons — hover previews destination palette */
      .iconbtn:hover.ok {
        background-color: var(--color-stage-shortlisted-bg);
        color: var(--color-stage-shortlisted-fg);
        border-color: var(--color-stage-shortlisted-border);
      }
      .iconbtn:hover.save {
        background-color: var(--color-stage-saved-bg);
        color: var(--color-stage-saved-fg);
        border-color: var(--color-stage-saved-border);
      }
      .iconbtn:hover.no {
        background-color: var(--color-stage-rejected-bg);
        color: var(--color-stage-rejected-fg);
        border-color: var(--color-stage-rejected-border);
      }

      /* Add-candidate — hover-expand affordance (width/label/icon swap).
         Single rule keeps the transition coordinated across properties. */
      .add-cand {
        transition:
          width 0.25s var(--ease-panel),
          padding 0.25s,
          background 0.15s,
          gap 0.25s;
      }
      .add-cand .icon-user,
      .add-cand .label {
        display: none;
      }
      .add-cand:hover {
        width: 160px;
        padding: 0 14px 0 12px;
        background-color: var(--color-ink-hover);
        gap: 8px;
      }
      .add-cand:hover .icon-plus {
        display: none;
      }
      .add-cand:hover .icon-user,
      .add-cand:hover .label {
        display: inline-block;
      }
    </style>
  </head>

      /* ======= Icons ======= */
      const icons = {
        mail: `<svg class="w-3 h-3 text-muted shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M5 19h14a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2z"/></svg>`,
        phone: `<svg class="w-3 h-3 text-muted shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 0 1 2-2h2l2 5-2.5 1.5a11 11 0 0 0 6 6L14 13l5 2v2a2 2 0 0 1-2 2A14 14 0 0 1 3 5z"/></svg>`,
        copy: `<svg class="w-[11px] h-[11px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="8" y="8" width="12" height="12" rx="2"/><path stroke-linecap="round" d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>`,
        resume: `<svg class="w-3 h-3 text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5z"/><path stroke-linecap="round" d="M9 13h6M9 17h4"/></svg>`,
        // Plain (unsized) icons used inside buttons where the parent sizes them.
        check: `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12l5 5L20 7"/></svg>`,
        bookmark: `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16l-7-4-7 4V5z"/></svg>`,
        x: `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" d="M6 6l12 12M6 18L18 6"/></svg>`,
      };

      /* ======= Helpers ======= */
      const srcPalette = {
        LinkedIn: "bg-source-linkedin-bg text-source-linkedin-fg",
        Referral: "bg-source-referral-bg text-source-referral-fg",
        Naukri: "bg-source-naukri-bg text-source-naukri-fg",
        "Career page": "bg-source-career-bg text-source-career-fg",
      };
      const stagePalette = {
        new: "text-stage-new-fg border-stage-new-border",
        screening: "text-stage-screening-fg border-stage-screening-border",
        shortlisted:
          "text-stage-shortlisted-fg border-stage-shortlisted-border",
        saved: "text-stage-saved-fg border-stage-saved-border",
        rejected: "text-stage-rejected-fg border-stage-rejected-border",
      };
      const stageDot = {
        new: "bg-stage-new-dot",
        screening: "bg-stage-screening-dot",
        shortlisted: "bg-stage-shortlisted-dot",
        saved: "bg-stage-saved-dot",
        rejected: "bg-stage-rejected-dot",
      };
      const stageLabel = (id) =>
        ({
          new: "New",
          screening: "Screening",
          shortlisted: "Shortlisted",
          saved: "Saved",
          rejected: "Rejected",
        })[id] || id;
      const mhCount = (c) => c.mustHaves.filter((m) => m.pass).length;
      const scoreOut10 = (s) => (s / 10).toFixed(1);

      const filtered = () =>
        CANDIDATES.filter((c) => {
          if (state.stage !== "all" && c.stage !== state.stage) return false;
          if (state.query) {
            const q = state.query.toLowerCase();
            if (
              !(c.name + " " + c.current + " " + c.summary + " " + c.location)
                .toLowerCase()
                .includes(q)
            )
              return false;
          }
          return true;
        });

      const copyBtn = (text, label) =>
        `<button class="copy inline-flex items-center justify-center opacity-0 ml-0.5 w-5 h-5 rounded-[6px] text-muted cursor-pointer bg-transparent border-0 transition-[opacity,background] duration-100 shrink-0 hover:bg-line-2 hover:text-ink" data-copy="${text}" title="Copy ${label}">${icons.copy}</button>`;

      const stagePill = (stage) =>
        `<span class="inline-flex items-center gap-1.25 rounded-full border bg-card py-0.5 pl-1.5 pr-2 font-medium whitespace-nowrap text-ui-11-5 leading-[1.4] ${stagePalette[stage] || "text-ink-soft border-line"}">
          <span class="w-1.5 h-1.5 rounded-full ${stageDot[stage] || "bg-faint"}"></span>${stageLabel(stage)}
        </span>`;

      const sourcePill = (c) =>
        `<span class="inline-flex items-center gap-1.25 rounded-full py-0.5 px-2 font-medium whitespace-nowrap text-ui-11-5 leading-[1.4] ${srcPalette[c.source] || ""}">${c.source}${c.sourceDetail ? ` · ${c.sourceDetail}` : ""}</span>`;

      const scoreBlock = (score) => `
    <div class="flex flex-col items-center gap-1.25 min-w-13">
      <div class="text-ui-22 font-semibold tracking-[-0.02em] tabular-nums leading-none">${scoreOut10(score)}<small class="text-ui-11 text-muted font-medium ml-px">/10</small></div>
      <div class="relative w-11 h-[3px] rounded bg-line overflow-hidden">
        <div class="absolute inset-y-0 left-0 bg-ink" style="width:${score}%"></div>
      </div>
    </div>
  `;

      // Icon action buttons — `iconbtn` + `ok|save|no` marker classes are required;
      // they drive the compound `.iconbtn:hover.ok` rules in the stylesheet.
      const actionButtons = () => `
    <div class="row-acts flex items-center gap-1.5">
      <button class="iconbtn ok flex items-center justify-center cursor-pointer border border-line bg-card text-ink-soft w-8 h-8 rounded-xs" title="Approve (shortlist)">${icons.check}</button>
      <button class="iconbtn save flex items-center justify-center cursor-pointer border border-line bg-card text-ink-soft w-8 h-8 rounded-xs" title="Save for later">${icons.bookmark}</button>
      <button class="iconbtn no flex items-center justify-center cursor-pointer border border-line bg-card text-ink-soft w-8 h-8 rounded-xs" title="Reject">${icons.x}</button>
    </div>
  `;

      // Smaller action buttons used inside the list view's 104px column.
      const actionButtonsList = () => `
    <div class="row-acts flex items-center gap-1">
      <button class="iconbtn ok flex items-center justify-center cursor-pointer border border-line bg-card text-ink-soft w-7 h-7 rounded-2xs" title="Approve (shortlist)"><svg class="w-[13px] h-[13px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12l5 5L20 7"/></svg></button>
      <button class="iconbtn save flex items-center justify-center cursor-pointer border border-line bg-card text-ink-soft w-7 h-7 rounded-2xs" title="Save for later"><svg class="w-[13px] h-[13px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16l-7-4-7 4V5z"/></svg></button>
      <button class="iconbtn no flex items-center justify-center cursor-pointer border border-line bg-card text-ink-soft w-7 h-7 rounded-2xs" title="Reject"><svg class="w-[13px] h-[13px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" d="M6 6l12 12M6 18L18 6"/></svg></button>
    </div>
  `;

      const contactItem = (icon, value, label) => `
    <span class="contact-item inline-flex items-center relative min-w-0 gap-1.5 text-ui-12-5 text-ink-soft">
      ${icon}
      <span class="overflow-hidden text-ellipsis whitespace-nowrap min-w-0">${value}</span>
      ${copyBtn(value, label)}
    </span>
  `;

      const contactInlineCard = (c) => `
    ${contactItem(icons.mail, c.email, "email")}
    ${contactItem(icons.phone, c.phone, "phone")}
  `;

      /* ======= Renderers ======= */
      const renderCards = (list) => {
        if (list.length === 0)
          return `<div class="py-10 px-5 text-center text-muted bg-card border border-dashed border-line rounded-md">No candidates match this filter.</div>`;
        return `<div class="flex flex-col gap-2.5">${list
          .map(
            (c) => `
      <article class="border border-line bg-card rounded-md py-4 px-4.5 shadow-card cursor-pointer transition-[transform,border-color] duration-[80ms] hover:-translate-y-px hover:border-line-hover" data-id="${c.id}">
        <div class="grid items-start grid-cols-[52px_minmax(0,1fr)_auto] gap-3.5">
          <div class="pt-0.5">${scoreBlock(c.score)}</div>
          <div class="min-w-0 max-w-cc-main">
            <div class="flex items-center flex-wrap gap-2.5">
              <div class="text-ui-16 font-semibold tracking-[-0.01em]">${c.name}</div>
              ${stagePill(c.stage)}
            </div>
            <div class="text-muted text-ui-12-5 mt-0.5"><b class="text-ink-soft font-medium">${c.current}</b> · ${c.location} · ${c.yoe} yrs</div>
            <div class="text-ink-soft text-ui-13-5 mt-2.5 leading-[1.5] max-w-[72ch]">${c.summary}</div>
            <div class="flex flex-wrap items-center gap-x-4 gap-y-3 mt-3 pt-3 border-t border-dashed border-line">
              ${contactInlineCard(c)}
              ${sourcePill(c)}
              <button class="inline-flex items-center gap-1.25 border border-line bg-card rounded-2xs py-1 px-2 text-ui-12 text-ink-soft cursor-pointer hover:border-line-hover hover:bg-hover-alt" data-action="resume">${icons.resume}<span>Resume</span></button>
            </div>
          </div>
          <div class="flex flex-col items-end shrink-0 gap-2.5">
            <div class="text-ui-11-5 text-muted">Applied ${c.appliedAgo} ago</div>
            ${actionButtons()}
          </div>
        </div>
      </article>
    `,
          )
          .join("")}</div>`;
      };

      const renderList = (list) => {
        if (list.length === 0)
          return `<div class="py-10 px-5 text-center text-muted bg-card border border-dashed border-line rounded-md">No candidates match this filter.</div>`;
        const gridCols =
          "grid-cols-[62px_minmax(180px,1.4fr)_minmax(160px,1.3fr)_minmax(110px,1fr)_54px_minmax(180px,1.3fr)_minmax(130px,1fr)_140px_120px_104px]";
        return `<div class="border border-line bg-card rounded-md overflow-hidden shadow-table">
      <div class="overflow-x-auto">
        <div class="grid ${gridCols} items-stretch border-b border-line text-ui-10-5 tracking-[0.1em] uppercase text-muted font-semibold bg-line-2 min-w-[1280px]">
          ${[
            "Score",
            "Candidate",
            "Current role",
            "Location",
            "YOE",
            "Email",
            "Phone",
            "Stage",
            "Source",
            "Actions",
          ]
            .map(
              (h, i, arr) =>
                `<div class="flex items-center py-2.5 px-3${i === arr.length - 1 ? "" : " border-r border-line"}">${h}</div>`,
            )
            .join("")}
        </div>
        ${list
          .map(
            (c) => `
          <div class="grid ${gridCols} items-stretch border-b border-line last:border-b-0 min-w-[1280px] cursor-pointer transition-colors duration-[80ms] hover:bg-hover" data-id="${c.id}">
            <div class="flex flex-col items-center justify-center p-3 border-r border-line-3 min-w-0">${scoreBlock(c.score)}</div>
            <div class="flex flex-col justify-center p-3 border-r border-line-3 min-w-0">
              <div class="text-ui-13-5 font-semibold tracking-[-0.01em] overflow-hidden text-ellipsis whitespace-nowrap">${c.name}</div>
              <div class="text-ui-12 text-muted overflow-hidden text-ellipsis whitespace-nowrap mt-0.5">${c.summary}</div>
            </div>
            <div class="flex flex-col justify-center p-3 border-r border-line-3 min-w-0">
              <div class="text-ui-13 text-ink overflow-hidden text-ellipsis whitespace-nowrap"><b class="font-medium">${c.current}</b></div>
            </div>
            <div class="flex flex-col justify-center p-3 border-r border-line-3 min-w-0">
              <div class="text-ui-13 text-ink-soft overflow-hidden text-ellipsis whitespace-nowrap">${c.location}</div>
            </div>
            <div class="flex flex-col items-center justify-center p-3 border-r border-line-3 min-w-0 text-ui-13 text-ink tabular-nums font-medium text-center">${c.yoe}</div>
            <div class="flex flex-col justify-center p-3 border-r border-line-3 min-w-0">
              ${contactItem(icons.mail, c.email, "email")}
            </div>
            <div class="flex flex-col justify-center p-3 border-r border-line-3 min-w-0">
              ${contactItem(icons.phone, c.phone, "phone")}
            </div>
            <div class="flex flex-col items-start justify-center p-3 border-r border-line-3 min-w-0">${stagePill(c.stage)}</div>
            <div class="flex flex-col items-start justify-center p-3 border-r border-line-3 min-w-0">${sourcePill(c)}</div>
            <div class="flex flex-row justify-center items-center py-2 px-2.5 gap-1 min-w-0">${actionButtonsList()}</div>
          </div>
        `,
          )
          .join("")}
      </div>
    </div>`;
      };

      const renderSide = () => {
        const c = CANDIDATES.find((x) => x.id === state.selectedId);
        if (!c) {
          $("#side-scroll").innerHTML = "";
          return;
        }
        const fileBase = c.name
          .toLowerCase()
          .replace(/[^a-z]+/g, "-")
          .replace(/^-|-$/g, "");
        const contactRow = (icon, label, value) => `
      <div class="ci flex items-center gap-2.5 text-ui-13">
        ${icon}
        <span class="lab text-muted text-ui-11 uppercase tracking-[0.04em] w-12 shrink-0">${label}</span>
        <span class="val text-ink flex-1">${value}</span>
        <button class="copy opacity-50 inline-flex items-center justify-center w-5 h-5 rounded-[6px] text-muted cursor-pointer bg-transparent border-0 transition-[opacity,background] duration-100 hover:bg-line-2 hover:text-ink" data-copy="${value}">${icons.copy}</button>
      </div>
    `;
        $("#side-scroll").innerHTML = `
      <div class="py-5.5 px-6 pb-4 border-b border-line">
        <div class="flex items-center flex-wrap gap-2 pr-10">
          ${stagePill(c.stage)}
          ${sourcePill(c)}
        </div>
        <div class="grid items-end grid-cols-[1fr_auto] gap-3.5 mt-3">
          <div>
            <h2 class="font-serif font-normal text-ui-28 tracking-[-0.01em] leading-[1.1] m-0">${c.name}</h2>
            <div class="text-muted text-ui-13 mt-1"><b class="text-ink-soft font-medium">${c.current}</b> · ${c.location} · ${c.yoe} yrs</div>
          </div>
          <div class="flex flex-col items-end gap-1">
            <div class="text-ui-30 font-semibold tracking-[-0.02em] leading-none tabular-nums">${scoreOut10(c.score)}<small class="text-ui-13 text-muted font-medium"> /10</small></div>
            <div class="relative w-20 h-1 rounded bg-line overflow-hidden"><div class="absolute inset-y-0 left-0 bg-ink" style="width:${c.score}%"></div></div>
            <div class="text-ui-10-5 text-muted font-medium tracking-[0.04em] uppercase">match score</div>
          </div>
        </div>
        <div class="s-contact flex flex-col gap-2 mt-3.5 p-3 bg-line-2 rounded-xs">
          ${contactRow(icons.mail, "Email", c.email)}
          ${contactRow(icons.phone, "Phone", c.phone)}
        </div>
      </div>

      <div class="grid grid-cols-[1.5fr_1fr_1fr] gap-2 py-4 px-6 border-b border-line">
        <button class="inline-flex items-center justify-center gap-1.75 rounded-full bg-ink text-white border border-transparent py-2.5 px-0 font-medium text-ui-13 cursor-pointer whitespace-nowrap transition-[transform,background,border-color,color] duration-100 hover:-translate-y-px hover:bg-ink-hover-strong">${icons.check} Approve</button>
        <button class="inline-flex items-center justify-center gap-1.75 rounded-full bg-card text-ink border border-line py-2.5 px-0 font-medium text-ui-13 cursor-pointer whitespace-nowrap transition-[transform,background,border-color,color] duration-100 hover:-translate-y-px hover:border-line-hover hover:bg-hover-alt">${icons.bookmark} Save</button>
        <button class="inline-flex items-center justify-center gap-1.75 rounded-full bg-card text-ink border border-line py-2.5 px-0 font-medium text-ui-13 cursor-pointer whitespace-nowrap transition-[transform,background,border-color,color] duration-100 hover:-translate-y-px hover:text-stage-rejected-fg hover:border-stage-rejected-border hover:bg-stage-rejected-bg">${icons.x} Reject</button>
      </div>
      <div class="flex justify-between items-center py-3 px-6 border-b border-line">
        <div class="text-ui-12-5 text-muted"><b class="text-ink font-medium">${fileBase}-resume.pdf</b> · 2 pages</div>
        <button class="inline-flex items-center gap-1.75 rounded-full bg-card text-ink border border-line py-2.25 px-3.5 font-medium text-ui-13 cursor-pointer whitespace-nowrap transition-[transform,background,border-color,color] duration-100 hover:-translate-y-px hover:border-line-hover hover:bg-hover-alt">${icons.resume} View resume</button>
      </div>

      <div class="pt-1 px-6 pb-7">
        ${[
          `
          <h3 class="text-ui-10-5 uppercase tracking-[0.1em] text-muted font-semibold m-0 mb-2.5">Summary</h3>
          <div class="text-ui-14 text-ink leading-[1.55]">${c.summary}</div>
        `,
          `
          <h3 class="text-ui-10-5 uppercase tracking-[0.1em] text-muted font-semibold m-0 mb-2.5">Must-haves <span class="text-ink-soft normal-case tracking-normal font-medium ml-1.5">${mhCount(c)}/5</span></h3>
          <div class="flex flex-col gap-1.25">
            ${c.mustHaves
              .map(
                (m) => `<div class="grid items-center grid-cols-[18px_1fr] gap-2 text-ui-13 ${m.pass ? "" : "text-muted"}">
              <div class="flex items-center justify-center w-4 h-4 rounded-full text-white text-ui-10-5 font-bold ${m.pass ? "bg-ink" : "bg-line text-muted"}">${m.pass ? "✓" : "·"}</div>${m.label}
            </div>`,
              )
              .join("")}
          </div>
        `,
          `
          <h3 class="text-ui-10-5 uppercase tracking-[0.1em] text-muted font-semibold m-0 mb-2.5">Nice-to-haves <span class="text-ink-soft normal-case tracking-normal font-medium ml-1.5">${c.niceHaves.filter((n) => n.pass).length}/5</span></h3>
          <div class="flex flex-col gap-1.25">
            ${c.niceHaves
              .map(
                (m) => `<div class="grid items-center grid-cols-[18px_1fr] gap-2 text-ui-13 ${m.pass ? "" : "text-muted"}">
              <div class="flex items-center justify-center w-4 h-4 rounded-full text-white text-ui-10-5 font-bold ${m.pass ? "bg-ink" : "bg-line text-muted"}">${m.pass ? "✓" : "·"}</div>${m.label}
            </div>`,
              )
              .join("")}
          </div>
        `,
          `
          <h3 class="text-ui-10-5 uppercase tracking-[0.1em] text-muted font-semibold m-0 mb-2.5">Strengths</h3>
          ${c.strengths.map((s) => `<div class="py-2 px-3 mb-1.5 bg-line-2 rounded-xs border-l-2 border-ink"><b class="block text-ui-13 font-semibold mb-0.5 tracking-[-0.005em]">${s.title}</b><p class="m-0 text-ui-12-5 text-ink-soft leading-[1.5]">${s.evidence}</p></div>`).join("")}
        `,
          `
          <h3 class="text-ui-10-5 uppercase tracking-[0.1em] text-muted font-semibold m-0 mb-2.5">Gaps</h3>
          ${c.gaps.map((g) => `<div class="py-2 px-3 mb-1.5 bg-line-2 rounded-xs border-l-2 border-faint"><b class="block text-ui-13 font-semibold mb-0.5 tracking-[-0.005em]">${g.title}</b><p class="m-0 text-ui-12-5 text-ink-soft leading-[1.5]">${g.evidence}</p></div>`).join("")}
        `,
          `
          <h3 class="text-ui-10-5 uppercase tracking-[0.1em] text-muted font-semibold m-0 mb-2.5">Qualifying answers</h3>
          ${c.qualifying.map((q) => `<div class="mb-2.5"><b class="block text-ui-10-5 text-muted font-medium mb-0.5 tracking-[0.04em] uppercase">${q.q}</b><span class="text-ui-13">${q.a}</span></div>`).join("")}
        `,
        ]
          .map(
            (body, i, arr) =>
              `<div class="py-3.5${i === arr.length - 1 ? "" : " border-b border-line"}">${body}</div>`,
          )
          .join("")}
      </div>
    `;
      };

      const renderList_ = () => {
        const list = filtered();
        $("#list-root").innerHTML =
          state.view === "card" ? renderCards(list) : renderList(list);
      };

      /* ======= Side open/close ======= */
      const openSide = (id) => {
        state.selectedId = id;
        renderSide();
        $("#side").classList.add("on");
        $("#backdrop").classList.add("on");
        document.body.style.overflow = "hidden";
      };
      const closeSide = () => {
        $("#side").classList.remove("on");
        $("#backdrop").classList.remove("on");
        document.body.style.overflow = "";
      };

      /* ======= Events ======= */
      document.addEventListener("click", (e) => {
        // stage filter
        const stg = e.target.closest(".stg");
        if (stg) {
          $$("#stages .stg").forEach((b) => b.classList.remove("on"));
          stg.classList.add("on");
          state.stage = stg.dataset.stage;
          renderList_();
          return;
        }
        // view toggle
        const vt = e.target.closest("#view-toggle button");
        if (vt) {
          $$("#view-toggle button").forEach((b) => b.classList.remove("on"));
          vt.classList.add("on");
          state.view = vt.dataset.view;
          renderList_();
          return;
        }
        // copy
        const cp = e.target.closest(".copy");
        if (cp) {
          e.stopPropagation();
          navigator.clipboard?.writeText(cp.dataset.copy);
          cp.classList.add("copied");
          setTimeout(() => cp.classList.remove("copied"), 1100);
          return;
        }
        // close side
        if (e.target.closest("#side-close") || e.target.closest("#backdrop")) {
          closeSide();
          return;
        }
        // action icons / resume buttons inside rows — swallow so side doesn't open
        if (e.target.closest(".row-acts") || e.target.closest("[data-action='resume']"))
          return;
        // select candidate (opens overlay)
        const row = e.target.closest("[data-id]");
        if (row) openSide(row.dataset.id);
      });

      $("#search").addEventListener("input", (e) => {
        state.query = e.target.value;
        renderList_();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeSide();
      });

      /* ======= Initial paint ======= */
      renderList_();
    </script>
  </body>
</html>
